<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外帶餐點-薪勤機</title>

  <!-- Bootstrap -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <script src="js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="css/style.css?v=20260326_1248">

  <style>
    #categoryTree{
      display:flex !important;
      flex-direction:column !important;
      gap: 12px !important;
      margin-top: 12px !important;
    }
    #categoryTree > div{
      background:#ff6a2a !important;
      color:#fff !important;
      border: 0 !important;
      border-radius: 16px !important;

      padding: 8px 10px !important;
      min-height: 40px !important;
      display:flex !important;
      align-items:center !important;
      justify-content:flex-start !important;

      font-weight: 900 !important;
      font-size: 1.15rem !important;
      letter-spacing: 1px !important;

      box-shadow: 0 10px 22px rgba(0,0,0,.12) !important;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease !important;
      cursor: pointer;
      user-select: none;
    }
    #categoryTree > div:hover{
      transform: translateY(-2px) !important;
      box-shadow: 0 14px 28px rgba(0,0,0,.16) !important;
      filter: brightness(1.05) !important;
    }
    #categoryTree > div.active{
      transform: translateY(-2px) scale(1.04) !important;
      box-shadow: 0 16px 34px rgba(0,0,0,.20) !important;
      filter: brightness(0.98) !important;
    }

    #orderModalImg{
      width:100%;
      height:260px;
      object-fit:cover;
      border-radius:14px;
      display:block;
    }
  </style>
</head>

<body>
  <div class="kioskStage">
    <div class="kioskCanvas">
      <div class="mainContainer posContainer container">

    <!-- 主畫面：左分類 + 右餐點 -->
      <div class="row">
      <!-- 左側分類 -->
        <div class="col-3 categorySide">
          <div class="d-flex align-items-center justify-content-between">
            <div class="categoryTitle">外帶餐點</div>

          <!-- 購物車 -->
          <div class="cartIconWrap" id="cartIconWrap" role="button" tabindex="0">
            <img src="images/cart.png" alt="購物車" class="cartIconImg">
            <div class="cartBadge" id="cartBadge">0</div>
          </div>
        </div>

        <div id="categoryTree"></div>
      </div>

      <!-- 右側餐點 -->
      <div class="col-9 menuList">
        <div class="row" id="menuGrid"></div>
      </div>
    </div>

    <!-- 餐點彈窗 -->
    <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border-radius:16px; overflow:hidden;">
          <div class="modal-header">
            <h5 class="modal-title" id="orderModalTitle">餐點</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
          </div>

          <div class="modal-body">
            <img id="orderModalImg" src="" alt="">
            <div id="orderModalDesc" style="text-align:left; margin-top:12px; line-height:1.6;"></div>

            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:14px;">
              <div style="font-weight:900;">份數</div>
              <div style="display:flex; align-items:center; gap:10px;">
                <button type="button" class="btn btn-outline-secondary" id="qtyMinus">－</button>
                <div id="qtyText" style="min-width:28px; text-align:center; font-weight:900;">1</div>
                <button type="button" class="btn btn-outline-secondary" id="qtyPlus">＋</button>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">返回</button>
            <button type="button" class="btn btn-danger" id="confirmAddBtn">確認</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bottomBar">
      <div id="takeawayEmptyHint" class="takeawayEmptyHint d-none">
        目前沒有點餐內容，請先加入購物車。
      </div>

      <div class="text-end d-flex justify-content-end gap-2">
        <button
          type="button"
          class="checkoutBtn"
          id="takeawayBackBtn"
          onclick="location.href='index.html'">
          返回
        </button>
        <button
          type="button"
          class="checkoutBtn"
          id="checkoutBtn">
          結帳
        </button>
      </div>
    </div>
    <!-- 外帶取餐 -->
    <div class="modal" id="pickupModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content waitKiosk">

          <div class="modal-header">
            <h3 class="modal-title">外帶取餐</h3>
          </div>

          <div class="modal-body">
            <!-- Step A：輸入手機 -->
            <div id="pickupStepA">
              <div class="waitFormRow">
                <div class="waitFormLeft">
                  <div class="waitTip">請輸入手機號碼，系統將提供您的取餐號碼。</div>
                  <div class="waitInputLabel">手機號碼：</div>
                  <input id="pickupPhone" class="waitPhoneInput" inputmode="numeric" placeholder="09xxxxxxxx" />
                  <div id="pickupPhoneHint" class="waitErr d-none">請輸入正確手機號碼（10 碼，09 開頭）</div>
                </div>

                <!--  數字鍵盤 -->
                <div class="waitKeypad" id="pickupKeypad">
                  <button type="button" class="keyBtn" data-k="1">1</button>
                  <button type="button" class="keyBtn" data-k="2">2</button>
                  <button type="button" class="keyBtn" data-k="3">3</button>
                  <button type="button" class="keyBtn" data-k="4">4</button>
                  <button type="button" class="keyBtn" data-k="5">5</button>
                  <button type="button" class="keyBtn" data-k="6">6</button>
                  <button type="button" class="keyBtn" data-k="7">7</button>
                  <button type="button" class="keyBtn" data-k="8">8</button>
                  <button type="button" class="keyBtn" data-k="9">9</button>
                  <button type="button" class="keyBtn keyFn" data-k="back">⌫</button>
                  <button type="button" class="keyBtn" data-k="0">0</button>
                  <button type="button" class="keyBtn keyFn" data-k="noop">　</button>
                </div>
              </div>
            </div>

            <!-- Step C：確認手機 -->
            <div id="pickupStepC" class="d-none waitFinish" style="padding:30px 0;">
              <div class="finishTitle">請確認手機號碼</div>
              <div style="font-size:44px;font-weight:900;margin:18px 0;color:#111;" id="pickupConfirmPhoneText">09xxxxxxxx</div>
              <div class="finishMeta" style="margin-top:6px;">若需修改請按「編輯」</div>
            </div>

            <!-- Step B：顯示取餐號碼 -->
            <div id="pickupStepB" class="d-none waitFinish">
              <div class="finishTitle">您的取餐號碼為</div>
              <div class="finishNum" id="pickupNumberText">P000</div>
              <div class="finishMeta" id="pickupMetaText"></div>
              <div class="finishHint">10 秒後將自動返回首頁</div>
            </div>
          </div>

         
          <div class="modal-footer">
            <!-- A：取消 + 確認結帳（進入確認手機） -->
            <div id="pickupFooterA" style="width:100%;display:flex;justify-content:flex-end;gap:12px;">
              <button type="button" class="waitGhostBtn" data-bs-dismiss="modal" id="pickupCancelBtn">取消</button>
              <button type="button" class="waitPrimaryBtn" id="pickupConfirmBtn">確認結帳</button>
            </div>

            <!-- C：編輯 + 確定結帳 -->
            <div id="pickupFooterC" class="d-none" style="width:100%;display:flex;justify-content:flex-end;gap:12px;">
              <button type="button" class="waitGhostBtn" id="pickupEditBtn">編輯</button>
              <button type="button" class="waitPrimaryBtn" id="pickupFinalBtn">確定結帳</button>
            </div>

            <!-- B：取號後才出現關閉 -->
            <div id="pickupFooterB" class="d-none" style="width:100%;display:flex;justify-content:flex-end;">
              <button type="button" class="waitGhostBtn" id="pickupCloseBtn">關閉</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- 頁面內：訂單明細 -->
    <div id="sumOverlay" class="sumOverlay d-none">
      <div class="sumCard">
        <div class="sumHead">
          <div class="sumTitle">訂單明細</div>
          <button class="sumClose" id="sumCloseBtn" type="button">✕</button>
        </div>

        <div class="sumBody">
          <div class="sumTable">
            <div class="sumRow sumHeader">
              <div class="colItem">品項</div>
              <div class="colQty">數量</div>
              <div class="colSub">小計</div>
            </div>
            <div id="sumRows"></div>
          </div>

          <div class="sumTotalBar">
            <div>總金額：</div>
            <div id="sumTotal">$0</div>
          </div>
        </div>

        <div class="sumFoot">
          <button class="btn btn-outline-secondary" id="sumBackBtn" type="button">返回</button>
          <button class="btn btn-danger" id="sumPrimaryBtn" type="button">下一步輸入電話</button>
        </div>
      </div>
    </div>

      </div>
    </div>
  </div>
 

  <script src="js/mockApi.js"></script>
  <script type="module" src="js/takeaway_page.js"></script>
</body>
</html>
